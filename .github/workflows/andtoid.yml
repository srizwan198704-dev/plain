name: Sync Android App to PlainApp

on:
  push:
    branches:
      - main # শুধুমাত্র main ব্রাঞ্চে পুশ হলে এই অ্যাকশনটি চলবে

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ১. মূল সোর্স কোড ক্লোন করা
      - name: Checkout source code
        uses: actions/checkout@v4

      # ২. টার্গেট রিপোজিটরি (plainapp) ক্লোন করা
      - name: Clone destination repository
        env:
          API_TOKEN_GITHUB: ${{ secrets.PAT_TOKEN }}
        run: |
          git config --global user.name "srizwan198704-dev"
          git config --global user.email "srizwan198704-dev@users.noreply.github.com"
          git clone https://x-access-token:${API_TOKEN_GITHUB}@github.com/srizwan198704-dev/plainapp.git target-repo

      # ৩. শুধুমাত্র এন্ড্রয়েডের ফাইলগুলো কপি করা
      # (এখানে আমরা সাধারণত একটি এন্ড্রয়েড প্রজেক্টের core ফাইলগুলো রেখে বাকী সব বাদ দিচ্ছি)
      - name: Filter and Copy Android Files
        run: |
          # টার্গেট ফোল্ডার পরিষ্কার করা (পুরানো ফাইল থাকলে মুছে যাবে)
          rm -rf target-repo/*
          
          # এন্ড্রয়েডের জন্য প্রয়োজনীয় মূল ফাইল/ফোল্ডারগুলো কপি করা
          # আপনার প্রজেক্টের স্ট্রাকচার অনুযায়ী নিচের নামগুলো প্রয়োজনে পরিবর্তন করতে পারেন
          cp -r android target-repo/ 2>/dev/null || true
          cp -r app target-repo/ 2>/dev/null || true
          cp build.gradle target-repo/ 2>/dev/null || true
          cp settings.gradle target-repo/ 2>/dev/null || true
          cp gradle.properties target-repo/ 2>/dev/null || true
          cp gradlew target-repo/ 2>/dev/null || true
          cp -r gradle target-repo/ 2>/dev/null || true
          cp .gitignore target-repo/ 2>/dev/null || true

      # ৪. নতুন রিপোজিটরিতে শুধুমাত্র main ব্রাঞ্চে পুশ করা
      - name: Push to Destination Repo
        env:
          API_TOKEN_GITHUB: ${{ secrets.PAT_TOKEN }}
        run: |
          cd target-repo
          git checkout -b main 2>/dev/null || git checkout main
          git add -A
          
          # যদি কোনো পরিবর্তন না থাকে তবে এরর এড়ানোর জন্য চেক
          if git diff-index --quiet HEAD --; then
            echo "No changes to commit"
          else
            git commit -m "Automated sync: Android files only from plain repo"
            git push -u origin main --force
          fi
